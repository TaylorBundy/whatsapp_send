  <body>
    <main class="card" role="main">
      <div class="logo">
        <img
          src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'><path fill='%2325D366' d='M12 2C6.48 2 2 6.48 2 12c0 1.99.52 3.84 1.42 5.45L2 22l4.7-1.35C8.16 21.48 10.02 22 12 22c5.52 0 10-4.48 10-10S17.52 2 12 2z'/></svg>"
          alt="wa"
        />
        <h1>Enviar WhatsApp rápido</h1>
      </div>

      <label for="numero">Número (incluye código de país)</label>
      <div class="input-group">
        <!-- <select id="pais">

          <option value="57">🇨🇴 +57</option>
          <option value="51">🇵🇪 +51</option>
          <option value="56">🇨🇱 +56</option>
          <option value="1">🇺🇸 +1</option>
        </select> -->
        <div class="custom-select" id="customSelect">
          <div class="selected"><img id="selected" src="" /></div>

          <div class="options">
            <div data-code="54"><img /> Argentina (+54)</div>
            <div data-code="34"><img /> España (+34)</div>
            <div data-code="57"><img /> Colombia (+57)</div>
            <div data-code="1"><img /> Us (+1)</div>
            <div data-code="52"><img /> México (+52)</div>
            <div data-code="56"><img /> Chile (+56)</div>
          </div>
        </div>
        <!-- <div class="telefono"> -->
        <input
          id="numero"
          type="text"
          inputmode="numeric"
          placeholder="Ej: 1123456789"
          autocomplete="on"
        />
        <div id="historial" class="historial"></div>
        <!-- </div> -->
      </div>

      <div class="row">
        <button id="enviar">Abrir WhatsApp</button>
        <button id="copiar" class="secondary" title="Copiar número">
          Copiar
        </button>
      </div>

      <div id="msg" class="hint">
        Puedes presionar <strong>Enter</strong> para enviar.
      </div>
      <div id="success" class="success" style="display: none"></div>
      <footer>
        Si la página fue abierta como ventana emergente se cerrará
        automáticamente.
      </footer>
    </main>
